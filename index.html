<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://d3js.org; connect-src https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-192.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bitcoin TX Visualizer | txid.uk</title>
<meta name="description" content="비트코인 트랜잭션 입출력 네트워크 시각화">
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <div class="header-inner">
    <a href="https://txid.uk" class="logo">viz.txid.uk</a>
    <nav>
      <a href="https://txid.uk">탐색기</a>
      <a href="https://tools.txid.uk">Tools</a>
      <a href="#" class="active">Viz</a>
    </nav>
    <button id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<main>
  <div class="hero">
    <h1>TX <span class="accent">Visualizer</span></h1>
    <p class="hero-sub">트랜잭션 입출력 흐름을 네트워크 그래프로 시각화</p>
  </div>

  <div class="search-wrap">
    <input id="tx-input" class="search-input" placeholder="TXID 입력 (64자 hex) 또는 주소 입력" spellcheck="false">
    <button class="search-btn" onclick="loadViz()">시각화</button>
    <button class="search-btn secondary" onclick="loadDemo()">데모</button>
  </div>

  <div id="viz-info" class="viz-info"></div>
  <div id="viz-loading" class="viz-loading" style="display:none">
    <div class="spinner"></div><span>데이터 로딩 중…</span>
  </div>
  <div id="viz-container">
    <svg id="viz-svg"></svg>
    <div id="tooltip" class="tooltip"></div>
  </div>
  <div id="viz-legend" class="viz-legend" style="display:none">
    <div class="legend-item"><span class="legend-dot" style="background:#f7931a"></span> 입력 (Input)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> 출력 (Output)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#58a6ff"></span> 현재 TX</div>
    <div class="legend-item"><span class="legend-dot" style="background:#8b949e"></span> 주소 노드</div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span>© 2025 txid.uk</span>
    <span>mempool.space API · D3.js v7</span>
  </div>
</footer>

<script src="app.js"></script>

<style>
.appbar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2);margin-top:auto}
.appbar-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;text-decoration:none;color:var(--text2);font-size:.62rem;font-family:var(--font-ko);transition:all .2s;min-width:52px;background:var(--bg3)}
.appbar-item:hover{border-color:var(--accent);color:var(--accent)}
.appbar-home{border-color:var(--accent);color:var(--accent)}
.appbar-icon{font-size:1rem;line-height:1}
.appbar-label{white-space:nowrap}
</style>
<div class="appbar">
  <a href="https://txid.uk" class="appbar-item appbar-home"><span class="appbar-icon">₿</span><span class="appbar-label">탐색기</span></a>
  <a href="https://tools.txid.uk" class="appbar-item" ><span class="appbar-icon">🔧</span><span class="appbar-label">Tools</span></a><a href="https://viz.txid.uk" class="appbar-item" style="color:var(--accent);border-color:var(--accent)"><span class="appbar-icon">⚡</span><span class="appbar-label">Viz</span></a><a href="https://map.txid.uk" class="appbar-item" ><span class="appbar-icon">🗺</span><span class="appbar-label">Map</span></a><a href="https://nodes.txid.uk" class="appbar-item" ><span class="appbar-icon">🌐</span><span class="appbar-label">Nodes</span></a><a href="https://portfolio.txid.uk" class="appbar-item" ><span class="appbar-icon">💼</span><span class="appbar-label">Portfolio</span></a><a href="https://stats.txid.uk" class="appbar-item" ><span class="appbar-icon">📊</span><span class="appbar-label">Stats</span></a><a href="https://tx.txid.uk" class="appbar-item" ><span class="appbar-icon">📤</span><span class="appbar-label">TX</span></a>
</div>
</body>
</html>
